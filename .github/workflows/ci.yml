name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: docs
      - run: npm run lint
        working-directory: docs
      - run: npm install
        working-directory: example
      - run: npm run lint
        working-directory: example
      - run: npm install
        working-directory: webapp
      - run: npm run lint
        working-directory: webapp

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm install
        working-directory: example
      - run: npm test
        working-directory: example

  init-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Verify init produces installable project
        run: |
          DIR=$(mktemp -d)
          cd "$DIR"
          node "$GITHUB_WORKSPACE/dist/index.js" init --no-install
          sed -i 's|"skittles": "latest"|"skittles": "file:'"$GITHUB_WORKSPACE"'"|' package.json
          npm install
